name: Publish to npm

on:
    release:
        types: [published]

jobs:
    publish:
        runs-on: ubuntu-latest
        environment: prod
        permissions:
            contents: read
            id-token: write
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org
                  cache: npm

            - run: npm ci

            - run: npm run build:lib

            # Option 1: OIDC trusted publisher (no secret needed, recommended)
            # Configure on npmjs.com: package settings → Publishing access → Add trusted publisher
            # Set environment to "prod". Then remove the NODE_AUTH_TOKEN env var below.
            #
            # Option 2: Granular Access Token (expires after max 365 days)
            # Generate on npmjs.com → Access Tokens → Granular Access Token
            # Store as NPM_TOKEN in GitHub environment "prod" secrets.
            - run: npm publish --provenance --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
